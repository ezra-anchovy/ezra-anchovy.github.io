<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Thing — The Anti-Habit App</title>
    <style>
        :root {
            --zen-bg: #FAF9F7;
            --zen-text: #1E293B;
            --zen-muted: #94A3B8;
            --zen-sage: #8CA989;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--zen-bg);
            color: var(--zen-text);
            line-height: 1.7;
            padding: 2rem 1rem;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        h1 {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }
        .tagline {
            color: var(--zen-muted);
            font-size: 1.125rem;
            margin-bottom: 2rem;
        }
        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }
        a {
            color: var(--zen-sage);
            text-decoration: none;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: background 0.2s;
        }
        a:hover {
            background: rgba(140, 169, 137, 0.15);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>One Thing</h1>
    <p class="tagline">One habit. Done gently.</p>
    <div class="links">
        <a href="/onething/privacy.html">Privacy Policy</a>
        <a href="/onething/support.html">Support</a>
    </div>
</body>
</html>
