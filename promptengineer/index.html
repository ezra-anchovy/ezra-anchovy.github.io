<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptEngineer — Voice to AI Prompt</title>
    <style>
        :root {
            --bg: #0F0F13;
            --text: #F0EDE8;
            --muted: #6B7280;
            --accent: #6C6AF6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            padding: 2rem 1rem;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        .tagline {
            color: var(--muted);
            font-size: 1.125rem;
            margin-bottom: 2rem;
        }
        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }
        a {
            color: var(--accent);
            text-decoration: none;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(108,106,246,0.3);
            transition: background 0.2s;
        }
        a:hover { background: rgba(108,106,246,0.1); }
    </style>
</head>
<body>
    <h1>PromptEngineer</h1>
    <p class="tagline">Speak naturally. Get perfect AI prompts.</p>
    <div class="links">
        <a href="/promptengineer/privacy.html">Privacy Policy</a>
        <a href="/promptengineer/support.html">Support</a>
    </div>
</body>
</html>
